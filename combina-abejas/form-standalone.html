<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creador de Combina</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .form-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .form-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .form-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .form-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .step-indicator {
            display: flex;
            justify-content: space-between;
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            flex-wrap: wrap;
        }

        .step {
            flex: 1;
            text-align: center;
            position: relative;
            min-width: 60px;
        }

        .step-number {
            width: 35px;
            height: 35px;
            background: #ddd;
            color: #666;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-bottom: 5px;
            transition: all 0.3s;
        }

        .step.active .step-number {
            background: #667eea;
            color: white;
            transform: scale(1.1);
        }

        .step.completed .step-number {
            background: #48bb78;
            color: white;
        }

        .step-label {
            font-size: 11px;
            color: #666;
        }

        .step.active .step-label {
            color: #667eea;
            font-weight: bold;
        }

        .form-content {
            padding: 30px;
            min-height: 500px;
        }

        .step-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .step-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .preview-area {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }

        .orientation-preview {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .orientation-box {
            width: 180px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
            text-align: center;
        }

        .orientation-box.selected {
            border-color: #667eea;
            background: #e0e7ff;
            transform: scale(1.02);
        }

        .orientation-box:hover {
            transform: scale(1.02);
        }

        .image-upload-area {
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .image-upload-area:hover {
            border-color: #667eea;
            background: #f8f9fa;
        }

        .image-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .image-item {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #ddd;
            background: #f8f9fa;
        }

        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-image {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 22px;
            height: 22px;
            background: #ff4444;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .remove-image:hover {
            background: #cc0000;
            transform: scale(1.1);
        }

        .part-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .part-title {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
        }

        .form-buttons {
            display: flex;
            justify-content: space-between;
            padding: 20px 30px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #ddd;
            color: #666;
        }

        .btn-secondary:hover {
            background: #ccc;
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-success:hover {
            background: #38a169;
        }

        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c53030;
        }

        .success-message {
            background: #c6f6d5;
            color: #22543d;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #22543d;
        }

        .warning-message {
            background: #feebc8;
            color: #7c2d12;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #7c2d12;
        }

        .image-counter {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }

        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #e0e0e0;
        }

        @media (max-width: 768px) {
            .form-container {
                margin: 0;
            }
            
            .step-label {
                display: none;
            }
            
            .form-content {
                padding: 20px;
            }
            
            .step-indicator {
                padding: 15px;
            }
            
            .step-number {
                width: 30px;
                height: 30px;
                font-size: 12px;
            }
            
            .orientation-box {
                width: 140px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h1>Creador de Combina</h1>
            <p>Configura tu tragamonedas de combinaciones en 4 pasos</p>
        </div>
        
        <div class="step-indicator" id="stepIndicator"></div>
        
        <div class="form-content" id="formContent"></div>
        
        <div class="form-buttons">
            <button class="btn btn-secondary" id="prevBtn" disabled>Anterior</button>
            <button class="btn btn-primary" id="nextBtn">Siguiente</button>
        </div>
    </div>

    <script>
        class FormWizard {
            constructor() {
                this.currentStep = 0;
                this.totalSteps = 4;
                this.config = {
                    name: '',
                    partsCount: 3,
                    orientation: 'horizontal',
                    parts: []
                };
            }

            init() {
                this.renderStepIndicator();
                this.renderStepContent();
                this.attachEvents();
            }

            renderStepIndicator() {
                const container = document.getElementById('stepIndicator');
                const steps = ['Nombre', 'Partes', 'Orientacion', 'Imagenes'];
                
                container.innerHTML = steps.map((label, index) => `
                    <div class="step ${index === this.currentStep ? 'active' : ''} ${index < this.currentStep ? 'completed' : ''}">
                        <div class="step-number">${index + 1}</div>
                        <div class="step-label">${label}</div>
                    </div>
                `).join('');
            }

            renderStepContent() {
                const container = document.getElementById('formContent');
                
                switch(this.currentStep) {
                    case 0:
                        container.innerHTML = this.renderStep1();
                        break;
                    case 1:
                        container.innerHTML = this.renderStep2();
                        break;
                    case 2:
                        container.innerHTML = this.renderStep3();
                        break;
                    case 3:
                        container.innerHTML = this.renderStep4();
                        break;
                }
                
                this.initStepEvents();
            }

            renderStep1() {
                return `
                    <div class="step-content active">
                        <h2>Nombre del Combina</h2>
                        <div class="form-group">
                            <label>Como se llamara tu creacion</label>
                            <input type="text" id="combinaName" placeholder="Ej: Combinabeja, CriaturaFantastica, AvatarEpico" value="${this.config.name}">
                        </div>
                        <div class="preview-area">
                            <p>Elige un nombre descriptivo y divertido que identifique tu creacion</p>
                            <p style="margin-top: 10px; font-size: 12px; color: #666;">Este nombre aparecera en el titulo del juego</p>
                        </div>
                    </div>
                `;
            }

            renderStep2() {
                return `
                    <div class="step-content active">
                        <h2>Numero de partes</h2>
                        <div class="form-group">
                            <label>Cuantas partes tendra tu Combina</label>
                            <input type="number" id="partsCount" min="2" max="10" value="${this.config.partsCount}">
                        </div>
                        <div class="preview-area">
                            <p><strong>Ejemplos segun cantidad de partes</strong></p>
                            <ul style="margin-top: 10px; margin-left: 20px;">
                                <li><strong>2 partes:</strong> Cabeza + Cuerpo</li>
                                <li><strong>3 partes:</strong> Cabeza + Torso + Piernas</li>
                                <li><strong>4 partes:</strong> Casco + Visera + Armadura + Botas</li>
                            </ul>
                        </div>
                    </div>
                `;
            }

            renderStep3() {
                return `
                    <div class="step-content active">
                        <h2>Orientacion del ensamblaje</h2>
                        <p style="margin-bottom: 20px; color: #666;">Como se uniran las partes para formar el avatar final</p>
                        <div class="orientation-preview">
                            <div class="orientation-box ${this.config.orientation === 'horizontal' ? 'selected' : ''}" data-orientation="horizontal">
                                <div style="font-size: 30px; margin-bottom: 10px;">⬅️ ➡️</div>
                                <div><strong>Horizontal</strong></div>
                                <small style="color: #666;">Partes una al lado de la otra</small>
                                <div style="margin-top: 10px; font-size: 11px;">[Parte1] [Parte2] [Parte3]</div>
                            </div>
                            <div class="orientation-box ${this.config.orientation === 'vertical' ? 'selected' : ''}" data-orientation="vertical">
                                <div style="font-size: 30px; margin-bottom: 10px;">⬆️<br>⬇️</div>
                                <div><strong>Vertical</strong></div>
                                <small style="color: #666;">Partes apiladas una sobre otra</small>
                                <div style="margin-top: 10px; font-size: 11px;">[Parte1]<br>[Parte2]<br>[Parte3]</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            renderStep4() {
                while(this.config.parts.length < this.config.partsCount) {
                    this.config.parts.push({
                        name: 'Parte ' + (this.config.parts.length + 1),
                        variants: []
                    });
                }
                while(this.config.parts.length > this.config.partsCount) {
                    this.config.parts.pop();
                }
                
                let html = `
                    <h2>Cargar imagenes</h2>
                    <p style="margin-bottom: 20px; color: #666;">
                        <strong>Importante:</strong> Cada parte necesita al menos UNA imagen.
                    </p>
                `;
                
                for(let i = 0; i < this.config.partsCount; i++) {
                    const partName = 'Parte ' + (i + 1);
                    const variants = this.config.parts[i]?.variants || [];
                    const variantCount = variants.length;
                    
                    html += `
                        <div class="part-section">
                            <div class="part-title">
                                ${partName}
                                ${variantCount > 0 ? `<span class="image-counter">${variantCount} imagen(es)</span>` : '<span class="image-counter" style="background: #ff9800;">0 imagenes</span>'}
                            </div>
                            <div class="image-upload-area" data-part-index="${i}">
                                Haz clic o arrastra imagenes aqui
                                <div style="font-size: 12px; margin-top: 5px; color: #666;">Formatos: PNG, JPG, GIF, WEBP</div>
                                <input type="file" multiple accept="image/*" style="display: none;" data-part-index="${i}">
                            </div>
                            <div class="image-list" id="imageList-${i}">
                                ${variants.map((variant, idx) => `
                                    <div class="image-item" data-variant-index="${idx}">
                                        <img src="${variant.dataURL}" alt="${variant.name}">
                                        <div class="remove-image" data-part="${i}" data-variant="${idx}">×</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
                
                html += `
                    <div class="preview-area" style="margin-top: 20px; background: #e0e7ff;">
                        <p><strong>Consejo:</strong> Para mejores resultados, usa imagenes con fondo transparente (PNG) y proporciones similares.</p>
                        <p style="margin-top: 10px; font-size: 12px;">Las imagenes se guardaran directamente en el archivo JSON en formato base64.</p>
                    </div>
                `;
                
                return `<div class="step-content active">${html}</div>`;
            }

            initStepEvents() {
                switch(this.currentStep) {
                    case 0:
                        const nameInput = document.getElementById('combinaName');
                        if(nameInput) {
                            nameInput.addEventListener('input', (e) => {
                                this.config.name = e.target.value;
                            });
                        }
                        break;
                        
                    case 1:
                        const countInput = document.getElementById('partsCount');
                        if(countInput) {
                            countInput.addEventListener('change', (e) => {
                                const newCount = parseInt(e.target.value);
                                if(newCount >= 2 && newCount <= 10) {
                                    this.config.partsCount = newCount;
                                    this.config.parts = this.config.parts.slice(0, newCount);
                                } else {
                                    e.target.value = this.config.partsCount;
                                }
                            });
                        }
                        break;
                        
                    case 2:
                        const orientationBoxes = document.querySelectorAll('.orientation-box');
                        orientationBoxes.forEach(box => {
                            box.addEventListener('click', (e) => {
                                const orientation = box.dataset.orientation;
                                this.config.orientation = orientation;
                                orientationBoxes.forEach(b => b.classList.remove('selected'));
                                box.classList.add('selected');
                            });
                        });
                        break;
                        
                    case 3:
                        this.initImageUpload();
                        break;
                }
            }

            initImageUpload() {
                for(let i = 0; i < this.config.partsCount; i++) {
                    const uploadArea = document.querySelector(`.image-upload-area[data-part-index="${i}"]`);
                    if (!uploadArea) continue;
                    
                    const fileInput = uploadArea.querySelector('input[type="file"]');
                    
                    uploadArea.addEventListener('click', () => {
                        fileInput.click();
                    });
                    
                    uploadArea.addEventListener('dragover', (e) => {
                        e.preventDefault();
                        uploadArea.style.borderColor = '#667eea';
                        uploadArea.style.background = '#f0f0f0';
                    });
                    
                    uploadArea.addEventListener('dragleave', (e) => {
                        e.preventDefault();
                        uploadArea.style.borderColor = '#ddd';
                        uploadArea.style.background = '';
                    });
                    
                    uploadArea.addEventListener('drop', (e) => {
                        e.preventDefault();
                        uploadArea.style.borderColor = '#ddd';
                        uploadArea.style.background = '';
                        this.processImages(e.dataTransfer.files, i);
                    });
                    
                    fileInput.addEventListener('change', (e) => {
                        this.processImages(e.target.files, i);
                        fileInput.value = '';
                    });
                }
                
                document.querySelectorAll('.remove-image').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const partIndex = parseInt(btn.dataset.part);
                        const variantIndex = parseInt(btn.dataset.variant);
                        this.config.parts[partIndex].variants.splice(variantIndex, 1);
                        this.renderStepContent();
                    });
                });
            }

            processImages(files, partIndex) {
                if (!this.config.parts[partIndex]) {
                    this.config.parts[partIndex] = {
                        name: 'Parte ' + (partIndex + 1),
                        variants: []
                    };
                }
                
                const validFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
                
                if (validFiles.length === 0) {
                    this.showMessage('Por favor selecciona archivos de imagen validos (PNG, JPG, GIF, WEBP)', 'warning');
                    return;
                }
                
                let processed = 0;
                validFiles.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.config.parts[partIndex].variants.push({
                            name: file.name.replace(/\.[^/.]+$/, ''),
                            dataURL: e.target.result
                        });
                        processed++;
                        
                        if (processed === validFiles.length) {
                            this.renderStepContent();
                            this.showMessage('Se cargaron ' + validFiles.length + ' imagen(es) para la ' + (partIndex + 1) + ' parte', 'success');
                        }
                    };
                    reader.onerror = () => {
                        processed++;
                        this.showMessage('Error al cargar ' + file.name, 'error');
                    };
                    reader.readAsDataURL(file);
                });
            }

            validateStep() {
                switch(this.currentStep) {
                    case 0:
                        if (!this.config.name.trim()) {
                            this.showMessage('Por favor ingresa un nombre para tu Combina', 'error');
                            return false;
                        }
                        if (this.config.name.length < 3) {
                            this.showMessage('El nombre debe tener al menos 3 caracteres', 'error');
                            return false;
                        }
                        break;
                        
                    case 1:
                        if (this.config.partsCount < 2 || this.config.partsCount > 10) {
                            this.showMessage('El numero de partes debe estar entre 2 y 10', 'error');
                            return false;
                        }
                        break;
                        
                    case 3:
                        const missingParts = [];
                        for(let i = 0; i < this.config.partsCount; i++) {
                            if (!this.config.parts[i] || this.config.parts[i].variants.length === 0) {
                                missingParts.push('Parte ' + (i + 1));
                            }
                        }
                        if (missingParts.length > 0) {
                            this.showMessage('Faltan imagenes para: ' + missingParts.join(', ') + '. Cada parte necesita al menos una imagen.', 'error');
                            return false;
                        }
                        break;
                }
                return true;
            }

            showMessage(message, type = 'error') {
                const formContent = document.getElementById('formContent');
                const existingMsg = formContent.querySelector('.error-message, .success-message, .warning-message');
                if (existingMsg) existingMsg.remove();
                
                const msgDiv = document.createElement('div');
                msgDiv.className = type === 'error' ? 'error-message' : (type === 'success' ? 'success-message' : 'warning-message');
                msgDiv.innerHTML = message;
                formContent.insertBefore(msgDiv, formContent.firstChild);
                
                setTimeout(() => msgDiv.remove(), 4000);
            }

            nextStep() {
                if (this.validateStep()) {
                    if (this.currentStep < this.totalSteps - 1) {
                        this.currentStep++;
                        this.renderStepIndicator();
                        this.renderStepContent();
                        this.updateButtons();
                    } else if (this.currentStep === this.totalSteps - 1) {
                        this.complete();
                    }
                }
            }

            prevStep() {
                if (this.currentStep > 0) {
                    this.currentStep--;
                    this.renderStepIndicator();
                    this.renderStepContent();
                    this.updateButtons();
                }
            }

            updateButtons() {
                const prevBtn = document.getElementById('prevBtn');
                const nextBtn = document.getElementById('nextBtn');
                
                prevBtn.disabled = this.currentStep === 0;
                
                if (this.currentStep === this.totalSteps - 1) {
                    nextBtn.textContent = 'COMPLETAR Y EXPORTAR';
                    nextBtn.className = 'btn btn-success';
                } else {
                    nextBtn.textContent = 'Siguiente';
                    nextBtn.className = 'btn btn-primary';
                }
            }

            complete() {
                if (this.validateStep()) {
                    this.exportJSON();
                }
            }

            exportJSON() {
                const finalConfig = {
                    version: '1.0',
                    exportDate: new Date().toISOString(),
                    combinaName: this.config.name,
                    orientation: this.config.orientation,
                    theme: 'light',
                    parts: [],
                    adjustments: { parts: [] }
                };
                
                for (let i = 0; i < this.config.partsCount; i++) {
                    finalConfig.parts.push({
                        id: i,
                        name: 'Parte ' + (i + 1),
                        variants: this.config.parts[i].variants.map((v, idx) => ({
                            name: v.name,
                            dataURL: v.dataURL,
                            width: 0,
                            height: 0
                        }))
                    });
                }
                
                const jsonString = JSON.stringify(finalConfig, null, 2);
                const blob = new Blob([jsonString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                const safeName = this.config.name.replace(/[^a-z0-9]/gi, '_').toLowerCase();
                const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
                link.download = safeName + '_' + timestamp + '.json';
                link.href = url;
                link.click();
                
                URL.revokeObjectURL(url);
                
                this.showMessage('Combina "' + this.config.name + '" exportado con exito. El archivo JSON contiene todas las imagenes.', 'success');
                
                setTimeout(() => {
                    const goToGame = confirm('Deseas ir al combinador para jugar con tu creacion\n\nNecesitaras tener abierto el combinador y usar el boton "IMPORTAR" para cargar el JSON que acabas de descargar.');
                    if (goToGame) {
                        alert('Abre el combinador (index.html) y haz clic en el boton "IMPORTAR" para cargar el archivo JSON.');
                    }
                }, 500);
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            attachEvents() {
                document.getElementById('prevBtn').addEventListener('click', () => this.prevStep());
                document.getElementById('nextBtn').addEventListener('click', () => this.nextStep());
            }
        }

        const wizard = new FormWizard();
        wizard.init();
    </script>
</body>
</html>
